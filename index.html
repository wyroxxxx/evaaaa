<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Çok Seviyorum ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ARKA PLAN: Pembe tonu ve tekrarlayan Hello Kitty deseni */
            background-color: #ffb6c1; 
            background-image: url('https://i.ibb.co/6y4t6yB/hello-kitty-pattern-1.png');
            background-repeat: repeat;
            background-size: 150px;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }

        .main-wrapper {
            text-align: center;
            position: relative;
            background: rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 3px solid #ff99aa;
            box-shadow: 0 20px 40px rgba(255, 50, 100, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ortadaki Hello Kitty Görseli */
        .center-kitty {
            width: 280px;
            z-index: 1;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        /* Kitty'nin Elinde Tuttuğu Mesaj Kağıdı */
        .message-paper {
            background: #ffffff;
            border: 4px solid #ff3366;
            padding: 25px;
            border-radius: 20px;
            margin-top: -50px; /* Kitty'nin ellerine denk gelmesi için */
            position: relative;
            z-index: 2;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transform: rotate(-1deg); /* Hafif doğal dursun diye eğik */
        }

        .message-paper h2 {
            color: #ff3366;
            margin: 0;
            font-size: 26px;
            line-height: 1.3;
            text-align: center;
        }

        /* Alttaki Modern Müzik Çalar Paneli */
        .music-player {
            margin-top: 40px;
            background: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 2px solid #ff99aa;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .play-btn {
            font-size: 30px;
            cursor: pointer;
            color: #ff3366;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
        }

        .song-name {
            font-weight: bold;
            color: #555;
            font-size: 18px;
        }

        /* Ses Çubuğu Rengi */
        input[type="range"] {
            accent-color: #ff3366;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <img src="https://i.ibb.co/jH0m6r9/hello-kitty-waving.png" alt="Hello Kitty" class="center-kitty">
        
        <div class="message-paper">
            <h2>seni hello kittyleri sevdiğinden daha çok seviyorum</h2>
        </div>

        <div class="music-player">
            <div class="play-btn" id="playIcon">▶️</div>
            <div class="song-name">Çalıyor: Eva</div>
            <input type="range" id="vol" min="0" max="1" step="0.1" value="0.5">
        </div>

        <audio id="evaTrack" loop>
            <source src="eva.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const track = document.getElementById('evaTrack');
        const btn = document.getElementById('playIcon');
        const volume = document.getElementById('vol');

        // Ses ayarı
        track.volume = volume.value;
        volume.addEventListener('input', (e) => track.volume = e.target.value);

        // Oynat / Durdur Fonksiyonu
        btn.addEventListener('click', () => {
            if (track.paused) {
                track.play().then(() => btn.innerText = '⏸️');
            } else {
                track.pause();
                btn.innerText = '▶️';
            }
        });

        // Sayfada herhangi bir yere ilk tıklandığında müziği başlat (Tarayıcı kuralı)
        document.body.addEventListener('click', () => {
            if(track.paused) {
                track.play().then(() => btn.innerText = '⏸️');
            }
        }, {once: true});
    </script>

</body>
</html>
